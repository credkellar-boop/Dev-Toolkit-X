version: '3.8'

services:
  orchestrator:
    build: 
      context: ./src/orchestrator
    environment:
      - RUST_LOG=info
      - TRACE_EXPORT_PATH=/artifacts
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      - ai_gateway
      - vector_indexer

  ai_gateway:
    build:
      context: ./src/ai_gateway
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}

  vector_indexer:
    build:
      context: ./src/mcp
    ports:
      - "9090:9090"
    volumes:
      - ./:/workspace

  security_scanner:
    build:
      context: ./src/scanner
    command: ["audit", "--target", "/workspace"]
    volumes:
      - ./:/workspace
