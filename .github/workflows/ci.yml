name: Dev-Toolkit-X CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Run Zero-Trust Scanner
        run: cd src/scanner && go run audit.go

  build-orchestrator:
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v3
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - name: Build HFT Orchestrator
        run: cd src/orchestrator && cargo build --release
        
